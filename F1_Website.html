<!doctype html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>F1 Website</title>\n    <style>\n        body {\n            background-color: #222;\n            color: #fff;\n            font-family: Arial, sans-serif;\n            margin: 0;\n            padding: 0;\n        }\n        header {\n            background: #000;\n            padding: 10px;\n            text-align: center;\n        }\n        nav {\n            margin: 20px 0;\n        }\n        nav a {\n            color: #fff;\n            margin: 0 15px;\n            text-decoration: none;\n        }\n        nav a:hover {\n            text-decoration: underline;\n        }\n        .container {\n            padding: 20px;\n        }\n        footer {\n            background: #000;\n            padding: 10px;\n            text-align: center;\n            position: absolute;\n            bottom: 0;\n            width: 100%;\n        }\n    </style>\n</head>\n<body>\n    <header>\n        <h1>Formula 1 Website</h1>\n        <nav>\n            <a href="#">Home</a>\n            <a href="#">Teams</a>\n            <a href="#">Races</a>\n            <a href="#">News</a>\n            <a href="#">Contact</a>\n        </nav>\n    </header>\n    <div class="container">\n        <h2>Welcome to the Formula 1 World!</h2>\n        <p>This is a complete feature-rich Formula 1 website.</p>\n    </div>\n    <footer>\n        <p>&copy; 2026 F1 Website</p>\n    </footer>\n    <script>\n        // Shuffle functionality example\n        const links = document.querySelectorAll('nav a');\n        const shuffledLinks = [...links].sort(() => Math.random() - 0.5);\n        const nav = document.querySelector('nav');\n        nav.innerHTML = '';  // Clear existing links\n        shuffledLinks.forEach(link => nav.appendChild(link));\n    </script>\n</body>\n</html>
