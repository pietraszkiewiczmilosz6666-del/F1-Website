<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formula 1 Website</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            background: #c8102e;
            padding: 10px;
            text-align: center;
        }
        nav {
            margin: 20px 0;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            padding: 10px 20px;
            border: 1px solid white;
            transition: background 0.3s;
        }
        nav a:hover {
            background: white;
            color: black;
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin: 20px;
        }
        .gallery img {
            width: 200px;
            margin: 10px;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .gallery img:hover {
            transform: scale(1.1);
        }
        footer {
            text-align: center;
            padding: 20px;
            background-color: #c8102e;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to the Formula 1 World</h1>
        <nav>
            <a href="https://www.formula1.com/">Official F1 Website</a>
            <a href="#gallery">Gallery</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>
    <div class="gallery" id="gallery">
        <!-- Example images (replace with actual images) -->
        <img src="image1.jpg" alt="Car 1">
        <img src="image2.jpg" alt="Car 2">
        <img src="image3.jpg" alt="Car 3">
        <img src="image4.jpg" alt="Car 4">
    </div>
    <footer>
        <p>© 2026 All Rights Reserved</p>
    </footer>
    <script>
        // Shuffle Gallery Functionality
        const galleryImages = document.querySelectorAll('.gallery img');
        const shuffledImages = Array.from(galleryImages);

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function updateGallery() {
            const newImages = shuffleArray(shuffledImages);
            newImages.forEach((img, index) => {
                img.style.order = index;
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateGallery();
            setInterval(updateGallery, 5000); // Shuffle every 5 seconds
        });
    </script>
</body>
</html>
