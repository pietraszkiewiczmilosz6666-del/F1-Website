<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>F1 Ultimate Website</title>\n    <style>\n        body {\n            background-color: black;\n            color: white;\n            font-family: Arial, sans-serif;\n        }\n        header {\n            background-color: #222;\n            padding: 10px;\n        }\n        nav {\n            margin: 10px 0;\n        }\n        nav a {\n            color: white;\n            padding: 10px;\n            text-decoration: none;\n        }\n        .photo-container {\n            display: flex;\n            flex-wrap: wrap;\n            justify-content: center;\n        }\n        .car-photo {\n            margin: 10px;\n            max-width: 300px;\n        }\n        button {\n            background-color: #ff3333;\n            border: none;\n            color: white;\n            padding: 10px;\n            cursor: pointer;\n        }\n    </style>\n</head>\n<body>\n    <header>\n        <h1>F1 Ultimate Website</h1>\n        <nav>\n            <a href=\"https://www.formula1.com\">Official F1 Website</a>\n            <a href=\"#photos\">Car Photos</a>\n            <a href=\"#about\">About</a>\n        </nav>\n    </header>\n    <main>\n        <section id=\"photos\">\n            <h2>F1 Car Photos</h2>\n            <div class=\"photo-container\">\n                <img class=\"car-photo\" src=\"car1.jpg\" alt=\"F1 Car 1\">\n                <img class=\"car-photo\" src=\"car2.jpg\" alt=\"F1 Car 2\">\n                <img class=\"car-photo\" src=\"car3.jpg\" alt=\"F1 Car 3\">\n            </div>\n        </section>\n        <button onclick=\"shuffleImages()\">Shuffle Images</button>\n        <script>\n            function shuffleImages() {\n                const container = document.querySelector('.photo-container');\n                const images = Array.from(container.children);\n                for (let i = images.length - 1; i > 0; i--) {\n                    const j = Math.floor(Math.random() * (i + 1));\n                    [images[i].innerHTML, images[j].innerHTML] = [images[j].innerHTML, images[i].innerHTML];\n                }\n                images.forEach(img => container.appendChild(img));\n            }\n        <\/script>\n    </main>\n</body>\n</html>\n
